<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .coming-soon-hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: url('DSC01311-HDR.jpg') center/cover no-repeat;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .coming-soon-hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      font-weight: 800;
    }
    .coming-soon-hero p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    .coming-soon-logo {
      max-width: 300px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="coming-soon-hero">
    <img src="core.png" alt="Logo" class="coming-soon-logo" />
    <h1>Coming Soon</h1>
    <p>Our client portal is launching soon. Stay tuned!</p>
  </div>
</body>
</html>
